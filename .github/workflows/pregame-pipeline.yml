name: Pregame Pipeline (Sheet1 Loader)

on:
  schedule:
    - cron: "30 15 * * *"  # 10:30 AM Chicago
    - cron: "30 19 * * *"  # 2:30 PM Chicago
    - cron: "0 22 * * *"   # 5:00 PM Chicago
  workflow_dispatch:

jobs:
  pregame-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Sheet1 loader
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python scripts/pregame_pipeline.py