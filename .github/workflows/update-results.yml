name: Update Final Results

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas gspread google-auth nba_api requests joblib scipy scikit-learn==1.6.1 streamlit

      - name: Load top plays
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python scripts/load_top_plays.py

      - name: Run updater
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          python scripts/update_results.py
