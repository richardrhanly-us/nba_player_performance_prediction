name: Update Final Results

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas gspread google-auth nba_api

      - name: Run updater
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          python scripts/update_results.py
